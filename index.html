<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Inventarios</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #eeecea;
    --text: #1a1a18;
    --text-muted: #6b6b68;
    --text-hint: #9c9c98;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.25);
    --accent: #D85A30;
    --accent-green: #1D9E75;
    --info-bg: #e6f1fb;
    --info-text: #0c447c;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #262624;
      --bg-tertiary: #303030;
      --text: #f0ede8;
      --text-muted: #a0a09c;
      --text-hint: #6e6e6a;
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.22);
      --info-bg: #042c53;
      --info-text: #85b7eb;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
  }

  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1rem 4rem;
  }

  /* Header */
  .app-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .app-title { font-size: 22px; font-weight: 500; color: var(--text); }
  .app-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* Buttons */
  .btn {
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 500;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-secondary); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; background: var(--accent); }

  .saved-msg {
    font-size: 12px;
    color: var(--accent-green);
    font-weight: 500;
    display: none;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1rem;
  }
  .tab {
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: color 0.15s;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 8px 12px;
    font-size: 13px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
  }
  .search-box:focus { outline: none; border-color: var(--accent); }
  .cat-filter {
    padding: 8px 10px;
    font-size: 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
  }

  /* Stats */
  .stats {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .stat strong {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    display: block;
    margin-bottom: 1px;
  }

  /* Table container */
  .table-wrap {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg);
    max-height: 580px;
    overflow-y: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  colgroup col:nth-child(1) { width: 110px; }
  colgroup col:nth-child(2) { width: auto; }
  colgroup col:nth-child(3) { width: 90px; }
  colgroup col:nth-child(4) { width: 90px; }

  thead th {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 0.5px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 2;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  thead th:last-child { text-align: center; }

  td {
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text);
    border-bottom: 0.5px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg-secondary); }

  .cat-row td {
    padding: 0;
    background: var(--bg-tertiary) !important;
  }
  .cat-label {
    display: block;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .code {
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .unit-cell {
    font-size: 11px;
    color: var(--text-hint);
    text-align: center;
  }
  .qty-input {
    width: 68px;
    padding: 4px 8px;
    font-size: 12px;
    border: 0.5px solid var(--border-strong);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    text-align: right;
    display: block;
    margin: 0 auto;
  }
  .qty-input:focus { outline: none; border-color: var(--accent); }
  .qty-input.has-value {
    background: var(--info-bg);
    border-color: var(--info-text);
    color: var(--info-text);
    font-weight: 500;
  }

  .no-results {
    text-align: center;
    padding: 3rem;
    font-size: 14px;
    color: var(--text-muted);
  }

  /* Print */
  @media print {
    body { background: white; }
    .app-header, .tabs, .controls, .stats, .header-actions { display: none !important; }
    .table-wrap { max-height: none; border: none; }
    .qty-input { border: 1px solid #ccc !important; background: white !important; }
    .page { padding: 0; max-width: 100%; }
    .print-title { display: block !important; font-size: 16px; font-weight: bold; margin-bottom: 12px; }
  }
  .print-title { display: none; }
</style>
</head>
<body>
<div class="page">

  <div class="app-header">
    <div>
      <div class="app-title">Sistema de Inventarios</div>
      <div class="app-subtitle">Rocoto · Hot Wings · Malanga — Conteo de fin de mes</div>
    </div>
    <div class="header-actions">
      <span class="saved-msg" id="savedMsg">✓ Guardado</span>
      <button class="btn" onclick="window.print()">Imprimir</button>
      <button class="btn btn-primary" onclick="saveAll()">Guardar conteo</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="controls">
    <input class="search-box" type="text" id="searchInput" placeholder="Buscar por nombre o código..." oninput="renderTable()">
    <select class="cat-filter" id="catFilter" onchange="renderTable()"></select>
  </div>

  <div class="stats" id="statsBar"></div>

  <div class="table-wrap">
    <table>
      <colgroup>
        <col><col><col><col>
      </colgroup>
      <thead>
        <tr>
          <th>Código</th>
          <th>Artículo</th>
          <th style="text-align:center">Unidad</th>
          <th style="text-align:center">Cantidad</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

let currentBrand = 0;
const quantities = [{}, {}, {}];

function init() {
  const tabsEl = document.getElementById('tabs');
  brands.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = b.name;
    btn.onclick = () => switchBrand(i);
    tabsEl.appendChild(btn);
  });
  populateCatFilter();
  renderTable();
}

function switchBrand(idx) {
  currentBrand = idx;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.getElementById('searchInput').value = '';
  populateCatFilter();
  renderTable();
}

function getCategories() {
  return [...new Set(brands[currentBrand].items.map(i => i.cat))].sort();
}

function populateCatFilter() {
  const sel = document.getElementById('catFilter');
  const cats = getCategories();
  sel.innerHTML = '<option value="">Todas las categorías</option>' +
    cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  return brands[currentBrand].items.filter(item => {
    const matchQ = !q || item.art.toLowerCase().includes(q) || item.cod.toLowerCase().includes(q);
    const matchC = !cat || item.cat === cat;
    return matchQ && matchC;
  });
}

function renderTable() {
  const items = getFiltered();
  const catFilter = document.getElementById('catFilter').value;
  const qs = quantities[currentBrand];
  const body = document.getElementById('tableBody');

  if (!items.length) {
    body.innerHTML = `<tr><td colspan="4"><div class="no-results">Sin resultados para esa búsqueda</div></td></tr>`;
  } else {
    let html = '';
    let lastCat = null;
    items.forEach(item => {
      if (!catFilter && item.cat !== lastCat) {
        lastCat = item.cat;
        html += `<tr class="cat-row"><td colspan="4"><span class="cat-label">${item.cat}</span></td></tr>`;
      }
      const val = qs[item.cod] || '';
      const hasCls = val ? ' has-value' : '';
      html += `<tr>
        <td><span class="code">${item.cod}</span></td>
        <td style="word-break:break-word">${item.art}</td>
        <td class="unit-cell">${item.unit}</td>
        <td style="text-align:center">
          <input class="qty-input${hasCls}" type="number" min="0" step="any"
            placeholder="0" value="${val}" data-cod="${item.cod}"
            onchange="updateQty(this)" oninput="updateQty(this)">
        </td>
      </tr>`;
    });
    body.innerHTML = html;
  }

  const total = brands[currentBrand].items.length;
  const filled = Object.keys(qs).filter(k => qs[k] !== '' && qs[k] != null).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><strong>${total}</strong>Total insumos</div>
    <div class="stat"><strong>${items.length}</strong>Mostrando</div>
    <div class="stat"><strong>${filled}</strong>Con cantidad</div>
  `;
}

function updateQty(input) {
  const cod = input.dataset.cod;
  const val = input.value.trim();
  if (val === '' || val === '0') {
    delete quantities[currentBrand][cod];
    input.classList.remove('has-value');
  } else {
    quantities[currentBrand][cod] = val;
    input.classList.add('has-value');
  }
}

function saveAll() {
  const msg = document.getElementById('savedMsg');
  msg.style.display = 'inline';
  setTimeout(() => { msg.style.display = 'none'; }, 2500);
}

init();
</script>
